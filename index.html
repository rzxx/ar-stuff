<!doctype html>
<html lang="en">
  <head>
    <title>&lt;model-viewer&gt; template</title>
    <meta charset="utf-8" />
    <meta name="description" content="&lt;model-viewer&gt; template" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link type="text/css" href="./styles.css" rel="stylesheet" />
  </head>
  <body>
    <!-- <model-viewer> HTML element -->
    <model-viewer
      src="model.glb"
      ios-src="model.usdz"
      ar
      ar-modes="webxr scene-viewer quick-look"
      camera-controls
      tone-mapping="neutral"
      poster="poster.webp"
      shadow-intensity="0.65"
      environment-image="spruit_sunrise_1k_HDR.hdr"
      skybox-image="spruit_sunrise_1k_HDR.hdr"
      animation-name="ArmatureAction"
      auto-rotate
    >
      <div class="progress-bar hide" slot="progress-bar">
        <div class="update-bar"></div>
      </div>
      <button slot="ar-button" id="ar-button">View in your space</button>
      <div id="ar-prompt">
        <img src="ar_hand_prompt.png" />
      </div>
    </model-viewer>

    <div id="controls">
      <div class="control-section">
        <div class="section-title">Animations</div>
        <div id="anim-buttons" class="btn-group"></div>
      </div>

      <div class="control-section">
        <div class="section-title">Post-Processing</div>
        <div class="control-row">
          <label>Tone-Mapping</label>
          <select id="tone-mapping">
            <option value="neutral">Neutral</option>
            <option value="agx">AgX</option>
            <option value="aces">ACES</option>
            <option value="reinhard">Reinhard</option>
            <option value="cineon">Cineon</option>
            <option value="linear">Linear</option>
            <option value="none">None</option>
          </select>
        </div>
        <div class="control-row">
          <label>Exposure</label>
          <input type="range" id="exposure" min="0" max="2" step="0.01" value="1" />
          <span id="exposure-value">1.00</span>
        </div>
        <div class="control-row">
          <label>Shadow</label>
          <input type="range" id="shadow" min="0" max="2" step="0.01" value="0.65" />
          <span id="shadow-value">0.65</span>
        </div>
        <div class="btn-group" id="fx-buttons">
          <button class="fx-btn" data-fx="sepia">Sepia</button>
          <button class="fx-btn" data-fx="grayscale">Grayscale</button>
          <button class="fx-btn" data-fx="invert">Invert</button>
          <button class="fx-btn" data-fx="vignette">Vignette</button>
          <button class="fx-btn" data-fx="cool">Cool</button>
          <button class="fx-btn" data-fx="warm">Warm</button>
        </div>
        <div class="btn-group" style="margin-top:6px">
          <button id="fx-reset" class="fx-btn active">Reset All</button>
        </div>
      </div>
    </div>

    <script>
      // Progress bar handler (inline to avoid module scope issues)
      const onProgress = (event) => {
        const progressBar = event.target.querySelector('.progress-bar');
        const updatingBar = event.target.querySelector('.update-bar');
        updatingBar.style.width = `${event.detail.totalProgress * 100}%`;
        if (event.detail.totalProgress === 1) {
          progressBar.classList.add('hide');
          event.target.removeEventListener('progress', onProgress);
        } else {
          progressBar.classList.remove('hide');
        }
      };
      document.querySelector('model-viewer').addEventListener('progress', onProgress);
    </script>
    <!-- Loads <model-viewer> for browsers: -->
    <script
      type="module"
      src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"
    ></script>
    <script type="module" src="script.js"></script>
  </body>
</html>
